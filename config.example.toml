[pco]
app_id = "your_pco_app_id_here"
secret = "your_pco_secret_here"

# Discovery mode: "all", "folder", or "service_types"
#   all           — scan every service type in the account
#   folder        — scan service types in a specific folder (requires folder_id)
#   service_types — use specific service type IDs (requires service_type_ids)
discovery_mode = "folder"

# Folder ID — used when discovery_mode = "folder"
# Get folder IDs from: https://api.planningcenteronline.com/services/v2/folders
folder_id = "your_folder_id_here"

# Specific service type IDs — used when discovery_mode = "service_types"
service_type_ids = []

[obs]
enabled = true
host = "localhost"
port = 4455
password = ""            # Leave empty if no password set in OBS
update_interval_ms = 1000 # How often to push updates (milliseconds)

[team]
enabled = true
photo_cache_dir = ""           # Default: ~/.cache/obs-pco-live-timer/photos/
placeholder_photo = ""         # Custom placeholder avatar (auto-generated if empty)
slots = [
    "Worship Leader",
    "Vocalist",
    "Vocalist",
    "Drums",
    "Keys",
    "Sound Engineer",
]
